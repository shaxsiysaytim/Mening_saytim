<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozodaxon Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav> 
  const token = "BU_YERGA_TOKEN";
const chat_id = "BU_YERGA_CHAT_ID";
  <h2>Ozodaxon</h2>
  <ul>
    <li><a href="#home">Asosiy</a></li>
    <li><a href="#portfolio">Portfolio</a></li>
    <li><a href="#feedback">Fikr</a></li>
  </ul>
  <button onclick="toggleMode()" class="btn">🌙</button>
</nav>

<header id="home">
  <h1>Frontend Developer | Parfumerya</h1>
</header>

<section id="portfolio">
  <h2>Parfumlar</h2>
  <div class="grid">
    <img src="https://images.unsplash.com/photo-1592945403244-b3fbafd7f539">
    <img src="https://images.unsplash.com/photo-1615634262417-2a7e9c9f2c18">
  </div>
</section>

<section id="feedback">
  <h2>Fikr bildirish</h2>
  <form onsubmit="sendToTelegram(event)">
    <input type="text" id="name" placeholder="Ismingiz" required>
    <textarea id="message" placeholder="Fikringiz..." required></textarea>
    <button type="submit">Yuborish</button>
  </form>
</section>

<script>

function toggleMode(){
  document.body.classList.toggle("light");
}

function sendToTelegram(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const message = document.getElementById("message").value;

  const token = "BU_YERGA_TOKEN";
  const chat_id = "BU_YERGA_CHAT_ID";

  const text = `Yangi fikr:\nIsm: ${name}\nXabar: ${message}`;

  fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      chat_id: chat_id,
      text: text
    })
  })
  .then(() => alert("Yuborildi ✅"))
  .catch(() => alert("Xatolik ❌"));
}

</script>

</body>
</html>
